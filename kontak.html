<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Form Kontak</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 5px;
            width: 450px;
            border: 1px solid #ddd;
        }

        h2 {
            text-align: center;
            color: #1a6682;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .gender-group {
            margin-bottom: 20px;
        }

        .btn-kirim {
            width: 100%;
            background-color: #1a6682;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-kirim:hover {
            background-color: #145066;
        }

        .alert {
            background-color: #d4edda;
            color: #155724;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
        }

        .alert-success {
            display: none;
            background-color: #d4edda;
            color: #155724;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>

<body>
    
    <div class="container">

        <div id="statusMessage" class="alert-success">
            Data diterima
        </div>

        <h2>Form Kontak</h2>

        <form action="simpan_kontak.php" method="POST">
            <label>Nama:</label>
            <input type="text" name="nama" required>

            <label>Jenis Kelamin:</label>
            <div class="gender-group">
                <input type="radio" name="jkel" value="Laki-laki" required> Laki-laki
                <input type="radio" name="jkel" value="Perempuan"> Perempuan
            </div>

            <label>Email:</label>
            <input type="email" name="email" required>

            <label>Alamat:</label>
            <input type="text" name="alamat" required>

            <label>Kota:</label>
            <input type="text" name="kota" required>

            <label>Pesan:</label>
            <textarea name="pesan" rows="5" required></textarea>

            <button type="submit" class="btn-kirim">Kirim</button>
        </form>
    </div>
    <script>
        
        // JavaScript untuk mengecek apakah ada "?status=sukses" di URL
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('status') === 'sukses') {
            document.getElementById('statusMessage').style.display = 'block';
        }
    </script>
</body>
    
</html>
